<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prompt AI | Premium AI Prompt Library</title>
    <!-- Google Fonts: Inter & Poppins for modern clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, rgba(15, 25, 45, 0.95), rgba(5, 12, 25, 0.98));
            background-attachment: fixed;
            backdrop-filter: blur(2px);
            padding: 2rem 1.5rem;
        }

        /* Animated gradient overlay for extra premium feel */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 50%, rgba(80, 120, 230, 0.15), transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: subtleShift 12s infinite alternate;
        }

        @keyframes subtleShift {
            0% { opacity: 0.5; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.05);}
        }

        /* main container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* header with glass effect */
        .glass-header {
            background: rgba(20, 30, 55, 0.45);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #B0C4FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #b9d0ff;
            font-size: 2.2rem;
        }

        .sub {
            color: rgba(220, 235, 255, 0.8);
            margin-top: 0.4rem;
            font-weight: 400;
        }

        /* search & filter row + dark mode toggle */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        .search-wrapper {
            flex: 2;
            min-width: 220px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a5bbf0;
            font-size: 1.1rem;
        }

        #searchInput {
            width: 100%;
            background: rgba(25, 35, 60, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 60px;
            padding: 0.9rem 1rem 0.9rem 3rem;
            font-size: 1rem;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #8bb3ff;
            background: rgba(35, 45, 75, 0.7);
            box-shadow: 0 0 12px rgba(100, 150, 255, 0.3);
        }

        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
        }

        .cat-btn {
            background: rgba(45, 55, 85, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,240,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #eef3ff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cat-btn i {
            margin-right: 6px;
            font-size: 0.8rem;
        }

        .cat-btn.active, .cat-btn:hover {
            background: rgba(100, 140, 255, 0.7);
            border-color: rgba(255,255,255,0.5);
            color: white;
            transform: translateY(-2px);
        }

        .dark-toggle {
            background: rgba(30, 40, 65, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
        }

        .dark-toggle span {
            font-size: 0.9rem;
            font-weight: 500;
            color: #f0f3ff;
        }

        /* Prompt cards grid/vertical layout */
        .prompts-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* glass card style */
        .prompt-card {
            background: rgba(25, 35, 55, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        .prompt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #0a1022;
            transition: transform 0.4s;
        }

        .prompt-card:hover .card-img {
            transform: scale(1.02);
        }

        .card-content {
            padding: 1.6rem 2rem 2rem 2rem;
        }

        .prompt-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #f0f5ff;
            font-weight: 450;
            background: rgba(0, 0, 0, 0.25);
            padding: 1rem 1.2rem;
            border-radius: 1.2rem;
            border-left: 3px solid #7a9eff;
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tag-badge {
            background: rgba(90, 130, 250, 0.35);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            color: #d6e6ff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn {
            background: linear-gradient(105deg, rgba(255,255,245,0.12), rgba(70, 110, 220, 0.4));
            border: 1px solid rgba(255,255,210,0.3);
            padding: 0.65rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .copy-btn i {
            font-size: 1rem;
        }

        .copy-btn:hover {
            background: linear-gradient(105deg, rgba(100, 150, 255, 0.6), rgba(50, 90, 200, 0.7));
            transform: scale(1.02);
            border-color: white;
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.4);
        }

        /* copied toast animation */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #6c9eff;
            letter-spacing: 0.3px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: rgba(25,35,55,0.5);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            color: #bfd6ff;
            font-size: 1.2rem;
        }

        /* Dark mode override (body class dark) */
        body.dark-mode {
            background: radial-gradient(circle at 20% 20%, #0a0e1a, #03060e);
        }
        body.dark-mode .glass-header,
        body.dark-mode .prompt-card {
            background: rgba(8, 12, 24, 0.65);
            border-color: rgba(255,255,245,0.15);
        }
        body.dark-mode .prompt-text {
            background: rgba(0,0,0,0.45);
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .card-content {
                padding: 1.2rem;
            }
            .prompt-text {
                font-size: 0.95rem;
            }
            .card-img {
                height: 170px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

        .footer-note {
            margin-top: 3rem;
            text-align: center;
            color: rgba(200,215,250,0.6);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-header">
        <h1><i class="fas fa-robot"></i> Prompt AI</h1>
        <div class="sub">Discover, copy & inspire — premium AI prompts library</div>

        <div class="controls-row">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search prompts... (e.g. image, code, chat)">
            </div>
            <div class="category-filters" id="categoryFilters">
                <button class="cat-btn active" data-cat="all"><i class="fas fa-layer-group"></i> All</button>
                <button class="cat-btn" data-cat="Image"><i class="fas fa-image"></i> Image</button>
                <button class="cat-btn" data-cat="Coding"><i class="fas fa-code"></i> Coding</button>
                <button class="cat-btn" data-cat="Chat"><i class="fas fa-comments"></i> Chat</button>
            </div>
            <div class="dark-toggle" id="darkModeToggle">
                <i class="fas fa-moon"></i>
                <span>Dark/Light</span>
            </div>
        </div>
    </div>

    <div id="promptsContainer" class="prompts-list">
        <!-- dynamic prompt cards will be injected here -->
    </div>
    <div class="footer-note">
        <i class="fas fa-copyright"></i> Prompt AI — elegant glassmorphism library
    </div>
</div>

<div id="copyToast" class="toast-msg"><i class="fas fa-check-circle"></i> Copied to clipboard!</div>

<script>
    // ---------- PROMPT DATABASE ----------
    const promptsData = [
        {
            id: 1,
            image: "https://picsum.photos/id/106/800/500",   // high-quality landscape, flowers
            prompt: "
Ultra-realistic cinematic scrapbook collage of a young woman (use uploaded face, maintain exact facial identity, no distortion or changes), arranged in a 4-panel aesthetic layout with soft torn-paper edges and slight overlapping layers.

Lighting: warm golden hour sunlight streaming through a window, creating soft natural highlights and shadow patterns on the face and background wall. Cozy indoor setting with visible window light streaks.

Appearance: glowing, dewy makeup with glossy lips, subtle natural blush, smooth radiant skin texture. Long straight black hair, slightly side-parted, soft natural flow.

Outfit: red floral printed sleeveless dress with square neckline, lightweight fabric. Accessories traditional oxidized jhumka earrings:

Panels composition:

Top left. front-facing portrait, looking directly at camera with a soft confident expression

Top right extreme close-up (focus on lips and one eye), high detail skin texture, sharp focus

Bottom left: side profile shot, soft gaze, sunlight hitting cheekbone

Bottom right: mid portrait, relaxed pose, hand gently touching hair

Add-ons:
Decorative soft pink lily flowers and baby's breath elements subtly placed around collage edges

Minimal modem music player Ul overlay (clean, aesthetic, semi-transparent)

Soft film grain, slight vignette for cinematic feel

Camera & Style:

DSLR quality, 85mm lens, shallow depth of field, soft focus, warm tones, cinematic lighting, ultra detailed, natural skin texture, Instagram aesthetic

Aspect ratio 3:4, style raw, high realism, no over-smoothing, no artificial skin",
            category: "Image",
            tags: "image prompt, realistic"
        },
        {
            id: 2,
            image: "https://picsum.photos/id/0/800/500",    // coding aesthetic laptop
            prompt: "Write a Python function that uses async/await to fetch data from multiple APIs concurrently, with error handling and rate limiting.",
            category: "Coding",
            tags: "python, async"
        },
        {
            id: 3,
            image: "https://picsum.photos/id/20/800/500",   // coffee + laptop chat vibe
            prompt: "Act as a creative marketing strategist. Craft a viral LinkedIn post about AI transforming remote work, with engaging hook and 3 key insights.",
            category: "Chat",
            tags: "business, marketing"
        },
        {
            id: 4,
            image: "https://picsum.photos/id/42/800/500",   // piano, music
            prompt: "Create an ethereal ambient music track description with lush pads, emotional piano melody, and subtle granular synthesis. Mood: nostalgic hopefulness.",
            category: "Image",
            prompt: "Create an intricate digital painting of a futuristic neon-lit city street with rain, reflections, and cyberpunk vibes, unreal engine 5 style.",  // artistic variation
            tags: "art, cyberpunk"
        },
        {
            id: 5,
            image: "https://picsum.photos/id/26/800/500",   // venice
            prompt: "Generate a dreamy watercolor illustration of a secret garden floating among clouds, vibrant pastel colors, soft glow, storybook style.",
            category: "Image",
            tags: "art, dreamy"
        },
        {
            id: 6,
            image: "https://picsum.photos/id/91/800/500",   // dark room with code glow
            prompt: "Build a React component that displays a dynamic filterable gallery with glassmorphism cards, using useState and useEffect hooks.",
            category: "Coding",
            tags: "react, frontend"
        },
        {
            id: 7,
            image: "https://picsum.photos/id/155/800/500",  // conversation abstract
            prompt: "Act as a helpful AI coach. Help me draft a convincing email to propose a collaboration with a tech influencer, highlighting mutual value.",
            category: "Chat",
            tags: "email, copywriting"
        },
        {
            id: 8,
            image: "https://picsum.photos/id/169/800/500",  // sun rays
            prompt: "A serene landscape of rolling hills under a starry sky, aurora borealis dancing, ultra HD, dreamlike atmosphere, sharp focus.",
            category: "Image",
            tags: "landscape, aurora"
        }
    ];

    // ** Fix for duplicate prompt data: replace id 4 with proper prompt text (since above had duplicate)
    promptsData[3].prompt = "Create an intricate digital painting of a futuristic neon-lit city street with rain, reflections, and cyberpunk vibes, unreal engine 5 style.";

    // additional ensure each has valid image, prompt fully displayed.
    // all good.

    // references
    const container = document.getElementById('promptsContainer');
    const searchInput = document.getElementById('searchInput');
    const catBtns = document.querySelectorAll('.cat-btn');
    const darkToggle = document.getElementById('darkModeToggle');
    const toastEl = document.getElementById('copyToast');

    let currentCategory = 'all';
    let searchTerm = '';

    // Helper: show toast with animation
    function showCopiedMessage() {
        toastEl.classList.add('show');
        setTimeout(() => {
            toastEl.classList.remove('show');
        }, 1800);
    }

    // copy to clipboard function
    async function copyPrompt(promptText) {
        try {
            await navigator.clipboard.writeText(promptText);
            showCopiedMessage();
        } catch (err) {
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = promptText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showCopiedMessage();
        }
    }

    // filter logic based on category + search
    function filterPrompts() {
        return promptsData.filter(prompt => {
            // category filter
            if (currentCategory !== 'all' && prompt.category !== currentCategory) return false;
            // search filter (case insensitive)
            if (searchTerm.trim() !== '') {
                const term = searchTerm.toLowerCase();
                return prompt.prompt.toLowerCase().includes(term) || 
                       prompt.category.toLowerCase().includes(term) ||
                       prompt.tags.toLowerCase().includes(term);
            }
            return true;
        });
    }

    // Render all prompt cards
    function renderPrompts() {
        const filtered = filterPrompts();
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> No prompts found. Try different keywords or category.</div>`;
            return;
        }

        let html = '';
        filtered.forEach(item => {
            // category icon mapping
            let catIcon = '';
            if (item.category === 'Image') catIcon = '<i class="fas fa-image"></i>';
            else if (item.category === 'Coding') catIcon = '<i class="fas fa-code"></i>';
            else if (item.category === 'Chat') catIcon = '<i class="fas fa-comment-dots"></i>';
            else catIcon = '<i class="fas fa-magic"></i>';
            
            html += `
                <div class="prompt-card" data-id="${item.id}">
                    <img class="card-img" src="${item.image}" alt="visual prompt" loading="lazy">
                    <div class="card-content">
                        <div class="prompt-text">${escapeHtml(item.prompt)}</div>
                        <div class="card-footer">
                            <div class="tag-badge">
                                ${catIcon} ${item.category}
                                <span style="margin-left:6px; opacity:0.7;">•</span> 
                                <i class="fas fa-tag"></i> ${item.tags.split(',')[0]}
                            </div>
                            <button class="copy-btn" data-prompt="${escapeHtmlAttr(item.prompt)}">
                                <i class="fas fa-copy"></i> Copy Prompt
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // Attach copy event listeners to all copy buttons
        const copyButtons = document.querySelectorAll('.copy-btn');
        copyButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const promptValue = btn.getAttribute('data-prompt');
                copyPrompt(promptValue);
            });
        });
    }

    // simple escape to avoid XSS (safeguard)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    function escapeHtmlAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Event listeners for search & filters
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderPrompts();
    });

    catBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const category = btn.getAttribute('data-cat');
            currentCategory = category;
            // update active class
            catBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPrompts();
        });
    });

    // Dark / Light mode toggle (dark mode class on body)
    function initTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const saved = localStorage.getItem('promptAiTheme');
        if (saved === 'dark' || (saved === null && prefersDark)) {
            document.body.classList.add('dark-mode');
        } else if (saved === 'light') {
            document.body.classList.remove('dark-mode');
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark-mode')) {
            document.body.classList.remove('dark-mode');
            localStorage.setItem('promptAiTheme', 'light');
        } else {
            document.body.classList.add('dark-mode');
            localStorage.setItem('promptAiTheme', 'dark');
        }
    }
    darkToggle.addEventListener('click', toggleTheme);
    initTheme();
    
    // initial render
    renderPrompts();

    // Additional micro-interaction: extra smoothness
    // optional: any resize?
    window.addEventListener('load', () => {
        // lazy images already fine
    });
</script>
</body>
</html>
